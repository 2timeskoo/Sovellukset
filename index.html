<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siri-Sanelin</title>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --accent-color: #25d366;
            --siri-blue: #2af5ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .status {
            font-size: 0.9rem;
            color: #888;
            margin-top: 20px;
        }

        #output {
            width: 100%;
            flex-grow: 1;
            margin: 20px 0;
            padding: 15px;
            font-size: 1.2rem;
            line-height: 1.6;
            overflow-y: auto;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            white-space: pre-wrap;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        #mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(45deg, #007aff, #5ac8fa);
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #mic-btn.active {
            animation: pulse 1.5s infinite;
            background: linear-gradient(45deg, #ff3b30, #ff9500);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(255, 59, 48, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        button.secondary {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
        }

        .history {
            width: 100%;
            max-height: 100px;
            font-size: 0.8rem;
            color: #666;
            border-top: 1px solid #222;
            padding-top: 10px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="status" id="status">Paina mikrofonia aloittaaksesi</div>

    <div id="output" contenteditable="true">Saneltu teksti ilmestyy tähän...</div>

    <div class="controls">
        <button id="mic-btn">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>

        <div class="action-btns">
            <button class="secondary" onclick="copyText()">Kopioi</button>
            <button class="secondary" style="background: #007aff;" onclick="sendEmail()">Lähetä Mailiin</button>
            <button class="secondary" onclick="clearText()">Tyhjennä</button>
        </div>
    </div>

    <div class="history" id="history">
        Versiohistoria:
    </div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const historyDiv = document.getElementById('history');

        let recognition;
        let isListening = false;
        let silenceTimer;
        let fullTranscript = "";

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'fi-FI';

            recognition.onresult = (event) => {
                clearTimeout(silenceTimer);
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        let text = event.results[i][0].transcript;
                        fullTranscript += capitalizeFirstLetter(text.trim());
                        
                        // 3 sekunnin tauon logiikka (käynnistetään tässä)
                        silenceTimer = setTimeout(() => {
                            if (!fullTranscript.endsWith('.') && fullTranscript.length > 0) {
                                fullTranscript += ". ";
                                updateDisplay();
                            }
                        }, 3000);

                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                updateDisplay(interimTranscript);
            };

            recognition.onerror = (err) => {
                status.innerText = "Virhe tunnistuksessa: " + err.error;
                stopListening();
            };

        } else {
            status.innerText = "Selaimesi ei tue puheentunnistusta.";
            micBtn.style.display = "none";
        }

        function toggleListening() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            if (output.innerText === "Saneltu teksti ilmestyy tähän...") output.innerText = "";
            recognition.start();
            isListening = true;
            micBtn.classList.add('active');
            status.innerText = "Kuunnellaan...";
        }

        function stopListening() {
            recognition.stop();
            isListening = false;
            micBtn.classList.remove('active');
            status.innerText = "Pysäytetty";
            addToHistory(fullTranscript);
        }

        function updateDisplay(interim = "") {
            output.innerText = fullTranscript + (interim ? "\n(" + interim + "...)" : "");
        }

        function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }

        function sendEmail() {
            const subject = "Sanelu " + new Date().toLocaleString('fi-FI');
            const body = output.innerText;
            window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        function copyText() {
            navigator.clipboard.writeText(output.innerText);
            alert("Teksti kopioitu leikepöydälle!");
        }

        function clearText() {
            if(confirm("Tyhjennetäänkö teksti?")) {
                fullTranscript = "";
                output.innerText = "";
            }
        }

        function addToHistory(text) {
            if (!text) return;
            const time = new Date().toLocaleTimeString('fi-FI');
            const entry = document.createElement('div');
            entry.innerText = `${time}: ${text.substring(0, 30)}...`;
            historyDiv.prepend(entry);
        }

        micBtn.addEventListener('click', toggleListening);
    </script>
</body>
</html>
